# Dam crash recovery: sub_823DFB70 asks a resource object for its packed-data
# buffer, then reads a byte from callback_result+2 (and later
# callback_result+stream_offset+2). A transient null/low result otherwise hits
# the runtime's intentionally protected guest low page. Jump to the function's
# normal epilogue after the hook substitutes the existing empty-result value.
[[midasm_hook]]
address = 0x823DFBAC
name = "ge_guard_packed_data_header"
registers = ["r3", "r31", "r1"]
after_instruction = false
jump_address_on_true = 0x823DFBDC
